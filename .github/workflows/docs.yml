name: Wiki quality

on:
  pull_request:
    paths:
      - "docs/**"
      - "docs_snippets/**"
      - "docs_search_terms.txt"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/check_wiki.py"
      - "scripts/sync_gitnexus_wiki.py"
      - ".gitnexus/wiki/**"
  push:
    paths:
      - "docs/**"
      - "docs_snippets/**"
      - "docs_search_terms.txt"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/check_wiki.py"
      - "scripts/sync_gitnexus_wiki.py"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-docs.txt
      - run: python scripts/sync_gitnexus_wiki.py --check
      - run: python scripts/check_wiki.py
      - run: mkdocs build --strict
